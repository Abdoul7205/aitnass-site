<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AITNASS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #0a0f1f;
            color: white;
        }

        /* Barre de navigation moderne (identique à l'accueil) */
        nav {
            background: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 170, 255, 0.2);
        }

        nav .logo-nav {
            max-height: 40px;
            width: auto;
        }

        nav .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav .nav-links a:hover {
            color: #00aaff;
        }

        /* Conteneur principal */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00aaff;
            font-size: 36px;
            margin-bottom: 40px;
        }

        /* Grille des coordonnées rapides */
        .contact-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-card {
            background: #131b31;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-card p {
            color: #b0b8c9;
            margin-top: 5px;
            font-size: 15px;
        }

        /* Style du formulaire */
        form {
            background: #111726;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(0, 170, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #18223c;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        /* Effet d'illumination au clic sur les champs */
        input:focus, textarea:focus {
            outline: none;
            border-color: #00aaff;
            background: #1c2848;
            box-shadow: 0 0 8px rgba(0, 170, 255, 0.3);
        }

        /* Bouton envoyer */
        button {
            background: #00aaff;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 170, 255, 0.3);
            margin-top: 10px;
        }

        button:hover {
            background: #0088cc;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 170, 255, 0.5);
        }

        /* Bouton WhatsApp Flottant */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.05);
        }

        /* Adaptation mobile */
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                gap: 15px;
            }
            nav .nav-links a {
                margin: 0 10px;
            }
            form {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Barre de Navigation -->
    <nav>
        <a href="index.html">
            <img src="logo.png" alt="AITNASS" class="logo-nav">
        </a>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="realisations.html">Réalisations</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
        <h1>Contactez-nous</h1>

        <!-- Blocs d'informations pratiques -->
        <div class="contact-info-grid">
            <div class="info-card">
                <h3>📍 Notre Siège</h3>
                <p>Ouagadougou, Burkina Faso</p>
            </div>
            <div class="info-card">
                <h3>📞 Téléphones</h3>
                <p>+226 77 06 67 32<br>+226 72 61 05 21</p>
            </div>
            <div class="info-card">
                <h3>📧 Email</h3>
                <p>aitnass.services@gmail.com</p>
            </div>
        </div>

        <!-- Formulaire de contact -->
        <form action="#" method="POST">
            <input type="text" placeholder="Votre nom complet" required>
            <input type="email" placeholder="Votre adresse email" required>
            <textarea rows="6" placeholder="Décrivez votre projet ou votre besoin en détail..." required></textarea>
            <button type="submit">Envoyer le message</button>
        </form>
    </div>

    <!-- Bouton WhatsApp Flottant -->
    <a href="https://wa.me/22677066732" class="whatsapp-float" target="_blank">
        💬 Discuter sur WhatsApp
    </a>

</body>
</html>
